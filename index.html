<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Registro via Sinesp</title>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      padding: 20px;
      text-align: center;
    }

    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 650px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    button {
      margin-top: 10px;
      padding: 10px;
      width: 100%;
      border: none;
      background: #007bff;
      color: white;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    #resenha {
      margin-top: 15px;
      text-align: left;
      background: #eee;
      padding: 10px;
      border-radius: 5px;
      white-space: pre-line;
      font-size: 14px;
    }

    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      font-size: 12px;
    }

    th {
      background: #007bff;
      color: white;
    }

    #saida {
      margin-top: 10px;
      color: green;
      font-weight: bold;
    }
  </style>
</head>

<body onload="carregarTabela()">

<div class="container">
  <h2>Registro via Print Sinesp</h2>

  <input type="file" id="imagem" accept="image/*">

  <button onclick="lerImagem()">📸 Ler imagem</button>

  <div id="resenha"></div>

  <button onclick="registrar()">✅ Registrar</button>

  <div id="saida"></div>

  <table id="tabela">
    <thead>
      <tr>
        <th>Placa</th>
        <th>Marca/Modelo</th>
        <th>Ano</th>
        <th>Cor</th>
        <th>Cidade/UF</th>
        <th>Data/Hora</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

</div>

<script>
let dadosExtraidos = {};
let resenhaTexto = "";

// OCR
function lerImagem() {
  const file = document.getElementById('imagem').files[0];

  if (!file) {
    alert("Selecione uma imagem.");
    return;
  }

  document.getElementById("resenha").innerText = "⏳ Lendo imagem...";

  Tesseract.recognize(file, 'eng')
    .then(({ data: { text } }) => {

      if (!text.trim()) {
        document.getElementById("resenha").innerText = "❌ Nenhum texto encontrado.";
        return;
      }

      dadosExtraidos = extrairDados(text);

      resenhaTexto =
`PLACA: ${dadosExtraidos.placa}
MARCA/MODELO: ${dadosExtraidos.marca}
ANO: ${dadosExtraidos.ano}
COR: ${dadosExtraidos.cor}
CIDADE/UF: ${dadosExtraidos.cidade}`;

      document.getElementById("resenha").innerText = resenhaTexto;

    })
    .catch(() => {
      document.getElementById("resenha").innerText = "❌ Erro ao ler imagem.";
    });
}

// EXTRAÇÃO
function extrairDados(texto) {

  texto = texto.toUpperCase();

  function buscar(regex) {
    const match = texto.match(regex);
    return match ? match[0].trim() : "-";
  }

  const placa = buscar(/[A-Z]{3}[0-9][A-Z0-9][0-9]{2}/);
  const cor = buscar(/PRETO|BRANCO|PRATA|VERMELHO|AZUL|CINZA|VERDE/);
  const ano = buscar(/\b(20[0-9]{2}|19[0-9]{2})\b/);

  let marca = "-";
  const marcaMatch = texto.match(/(TOYOTA|HONDA|FORD|CHEVROLET|FIAT|VW|VOLKSWAGEN|HYUNDAI|RENAULT)[A-Z0-9\s\-\/]+/);
  if (marcaMatch) marca = marcaMatch[0];

  let cidade = "-";
  const cidadeMatch = texto.match(/[A-Z\s]+\/[A-Z]{2}/);
  if (cidadeMatch) cidade = cidadeMatch[0];

  return { placa, marca, ano, cor, cidade };
}

// REGISTRAR
function registrar() {

  if (!resenhaTexto) {
    alert("Leia a imagem primeiro.");
    return;
  }

  const agora = new Date().toLocaleString();

  const registro = {
    ...dadosExtraidos,
    data: agora
  };

  let lista = JSON.parse(localStorage.getItem("registros") || "[]");
  lista.push(registro);

  localStorage.setItem("registros", JSON.stringify(lista));

  adicionarNaTabela(registro);

  document.getElementById("saida").innerText = "✅ Registro salvo!";
}

// TABELA
function adicionarNaTabela(registro) {
  const tabela = document.querySelector("#tabela tbody");

  const linha = `
    <tr>
      <td>${registro.placa}</td>
      <td>${registro.marca}</td>
      <td>${registro.ano}</td>
      <td>${registro.cor}</td>
      <td>${registro.cidade}</td>
      <td>${registro.data}</td>
    </tr>
  `;

  tabela.innerHTML += linha;
}

// CARREGAR
function carregarTabela() {
  const lista = JSON.parse(localStorage.getItem("registros") || "[]");
  lista.forEach(adicionarNaTabela);
}
</script>

</body>
</html>
