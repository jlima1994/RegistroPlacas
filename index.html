<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leitor de Veículo</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:#fff;
    text-align:center;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
}

button{
    width:100%;
    padding:15px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#22c55e;
    color:#000;
    font-weight:bold;
    font-size:16px;
}

input{
    width:100%;
    margin-top:10px;
}

table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
    background:#1e293b;
}

th, td{
    padding:10px;
    border:1px solid #334155;
    font-size:12px;
}

th{
    background:#334155;
}

.erro{
    color:#ef4444;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>LEITOR DE VEÍCULO</h2>

<input type="file" id="imageInput" accept="image/*">

<button onclick="processar()">PROCESSAR IMAGEM</button>

<div id="status"></div>

<table id="tabela" style="display:none;">
<thead>
<tr>
<th>PLACA</th>
<th>MODELO</th>
<th>ANO</th>
<th>COR</th>
<th>CIDADE/UF</th>
<th>DATA</th>
</tr>
</thead>
<tbody id="corpoTabela"></tbody>
</table>

</div>

<script>

async function processar(){

    const file = document.getElementById('imageInput').files[0];
    if(!file){
        alert("Selecione uma imagem");
        return;
    }

    document.getElementById("status").innerText = "LENDO IMAGEM...";

    const { data: { text } } = await Tesseract.recognize(file, 'por');

    console.log(text);

    let resultado = extrairDados(text);

    if(!resultado){
        document.getElementById("status").innerHTML = "<div class='erro'>ERRO AO IDENTIFICAR DADOS</div>";
        return;
    }

    adicionarTabela(resultado);

    document.getElementById("status").innerText = "SUCESSO";
}

function extrairDados(texto){

    texto = texto.toUpperCase();

    console.log("OCR BRUTO:\n", texto);

    // NORMALIZAÇÃO PESADA
    texto = texto
        .replace(/\n/g, " ")
        .replace(/\s+/g, " ")
        .replace(/0/g, "O")
        .replace(/\|/g, "I");

    console.log("TEXTO LIMPO:\n", texto);

    // 🔎 PLACA
    let placaMatch = texto.match(/[A-Z]{3}\s?[0-9][A-Z0-9][0-9]{2}/);
    let placa = placaMatch ? placaMatch[0].replace(" ", "") : null;

    // 🔎 MODELO (entre MARCA/MODELO e ANO)
    let modeloMatch = texto.match(/MARCA\/MODELO\s+(.*?)\s+ANO/);
    let modelo = modeloMatch ? modeloMatch[1] : null;

    // 🔎 ANO MODELO
    let anoModeloMatch = texto.match(/ANO DO MODELO\s+(\d{4})/);
    let anoModelo = anoModeloMatch ? anoModeloMatch[1] : null;

    // 🔎 ANO FABRICAÇÃO (mesmo que venha quebrado tipo "2")
    let anoFabMatch = texto.match(/ANO DE FABRICAÇÃO\s+(\d{1,4})/);
    let anoFab = anoFabMatch ? anoFabMatch[1] : null;

    // 🔥 CORREÇÃO INTELIGENTE DO ANO FAB
    if(anoFab && anoFab.length < 4 && anoModelo){
        anoFab = (parseInt(anoModelo) - 1).toString();
    }

    // 🔎 COR
    let corMatch = texto.match(/COR\s+([A-Z]+)/);
    let cor = corMatch ? corMatch[1] : null;

    // 🔎 CIDADE
    let cidadeMatch = texto.match(/CIDADE\/ESTADO\s+([A-Z\s\-]+)/);
    let cidade = cidadeMatch ? cidadeMatch[1].trim() : null;

    console.log({placa, modelo, anoFab, anoModelo, cor, cidade});

    // VALIDAÇÃO
    if(!placa || !modelo){
        return null;
    }

    return {
        placa,
        modelo,
        ano: (anoFab && anoModelo) ? `${anoFab}/${anoModelo}` : "N/I",
        cor: cor || "N/I",
        cidade: cidade || "N/I"
    };
}
function adicionarTabela(dados){

    const tabela = document.getElementById("tabela");
    const corpo = document.getElementById("corpoTabela");

    tabela.style.display = "table";

    let dataHora = new Date().toLocaleString("pt-BR");

    let linha = `
    <tr>
        <td>${dados.placa}</td>
        <td>${dados.modelo}</td>
        <td>${dados.ano}</td>
        <td>${dados.cor}</td>
        <td>${dados.cidade}</td>
        <td>${dataHora}</td>
    </tr>
    `;

    corpo.innerHTML += linha;
}

</script>

</body>
</html>
