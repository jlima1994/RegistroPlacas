<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro de Veículos</title>

<style>
body {
    font-family: Arial;
    background: #f4f4f4;
    padding: 20px;
}

.container {
    max-width: 500px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

h2 {
    text-align: center;
}

input, select, button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    font-size: 16px;
}

button {
    background: #28a745;
    color: white;
    border: none;
    cursor: pointer;
}

table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
}

th, td {
    border: 1px solid #ccc;
    padding: 8px;
    text-align: center;
}

th {
    background: #eee;
}
</style>
</head>

<body>

<div class="container">

<h2>Cadastro de Veículo</h2>

<input type="text" id="modelo" placeholder="Modelo">

<input type="text" id="placa" placeholder="Placa">

<select id="ano">
    <option value="">Ano Modelo</option>
</select>

<input type="text" id="cidade" placeholder="Cidade">

<input type="text" id="cor" placeholder="Cor do Veículo">

<button onclick="registrar()">Registrar</button>

<table id="tabela">
    <thead>
        <tr>
            <th>PLACA</th>
            <th>MODELO</th>
            <th>ANO</th>
            <th>CIDADE</th>
            <th>COR</th>
            <th>DATA E HORA</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

<script>

// 🔥 CONFIG FIREBASE (SUBSTITUA PELOS SEUS DADOS)
const firebaseConfig = {
    apiKey: "AIzaSyB-IpEzDag4tFUv3ijwVwyeqiPhtgOlL0Q",
    authDomain: "sistema-veicu.firebaseapp.com",
    projectId: "sistema-veicu",
    storageBucket: "sistema-veicu.firebasestorage.app",
    messagingSenderId: "984955826872",
    appId: "1:984955826872:web:bc04704905ac8503c9ba4d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 🔢 GERAR ANOS
function gerarAnos() {
    const select = document.getElementById("ano");
    const anoAtual = new Date().getFullYear();
    const anoFinal = anoAtual + 1;

    for (let ano = anoFinal; ano >= 1940; ano--) {
        let option = document.createElement("option");
        option.value = ano;
        option.textContent = ano;
        select.appendChild(option);
    }
}

// 🚗 FORMATAR PLACA AUTOMATICAMENTE
document.getElementById("placa").addEventListener("input", function(e) {
    let valor = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, "");

    if (valor.length > 3) {
        valor = valor.slice(0,3) + "-" + valor.slice(3,7);
    }

    e.target.value = valor;
});

// 📝 REGISTRAR
function registrar() {

    const modelo = document.getElementById("modelo").value;
    const placa = document.getElementById("placa").value;
    const ano = document.getElementById("ano").value;
    const cidade = document.getElementById("cidade").value;
    const cor = document.getElementById("cor").value;

    const dataHora = new Date().toLocaleString("pt-BR");

    if (!modelo || !placa || !ano || !cidade || !cor) {
        alert("Preencha todos os campos!");
        return;
    }

    const dados = {
        modelo,
        placa,
        ano,
        cidade,
        cor,
        dataHora
    };

    db.ref("registros").push(dados);

    limparCampos();
}

// 🧹 LIMPAR CAMPOS
function limparCampos() {
    document.getElementById("modelo").value = "";
    document.getElementById("placa").value = "";
    document.getElementById("ano").value = "";
    document.getElementById("cidade").value = "";
    document.getElementById("cor").value = "";
}

// 📊 CARREGAR DADOS EM TEMPO REAL
function carregarDados() {

    const tabela = document.querySelector("#tabela tbody");

    db.ref("registros").on("value", snapshot => {

        tabela.innerHTML = "";

        snapshot.forEach(item => {

            const d = item.val();

            const linha = `
                <tr>
                    <td>${d.placa}</td>
                    <td>${d.modelo}</td>
                    <td>${d.ano}</td>
                    <td>${d.cidade}</td>
                    <td>${d.cor}</td>
                    <td>${d.dataHora}</td>
                </tr>
            `;

            tabela.innerHTML += linha;
        });

    });
}

// 🚀 INIT
window.onload = () => {
    gerarAnos();
    carregarDados();
};

</script>

</body>
</html>
