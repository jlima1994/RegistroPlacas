<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Registro via Sinesp</title>

  <!-- OCR -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      padding: 20px;
      text-align: center;
    }

    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    button {
      margin-top: 10px;
      padding: 10px;
      width: 100%;
      border: none;
      background: #007bff;
      color: white;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    #resenha {
      margin-top: 15px;
      text-align: left;
      background: #eee;
      padding: 10px;
      border-radius: 5px;
      white-space: pre-line;
      font-size: 14px;
    }

    #saida {
      margin-top: 10px;
      color: green;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Registro via Print Sinesp</h2>

  <input type="file" id="imagem" accept="image/*">

  <button onclick="lerImagem()">📸 Ler imagem</button>

  <div id="resenha"></div>

  <button onclick="registrar()">✅ Registrar</button>

  <div id="saida"></div>
</div>

<script>
let textoExtraido = "";

// 🔍 OCR
function lerImagem() {
  const file = document.getElementById('imagem').files[0];

  if (!file) {
    alert("Selecione uma imagem primeiro.");
    return;
  }

  document.getElementById("resenha").innerText = "⏳ Lendo imagem...";

  Tesseract.recognize(
    file,
    'eng', // 🔥 mais estável que 'por'
    { logger: m => console.log(m) }
  )
  .then(({ data: { text } }) => {

    console.log("TEXTO OCR:", text);

    textoExtraido = text;

    if (!text || text.trim() === "") {
      document.getElementById("resenha").innerText = "❌ Nenhum texto reconhecido.";
      return;
    }

    const dados = extrairDados(text);

    document.getElementById("resenha").innerText =
      "🔍 TEXTO BRUTO:\n" + text +
      "\n\n📋 RESENHA:\n" + dados;

  })
  .catch(err => {
    console.error(err);
    document.getElementById("resenha").innerText = "❌ Erro ao ler imagem.";
  });
}

// 🧠 EXTRAÇÃO INTELIGENTE
function extrairDados(texto) {

  texto = texto.toUpperCase();

  function buscar(regex) {
    const match = texto.match(regex);
    return match ? match[0] : "Não encontrado";
  }

  // 🚗 placa padrão Brasil (antigo + Mercosul)
  const placa = buscar(/[A-Z]{3}[0-9][A-Z0-9][0-9]{2}/);

  const cor = buscar(/(PRETO|BRANCO|PRATA|VERMELHO|AZUL|CINZA|VERDE)/);

  const ano = buscar(/\b(20[0-9]{2}|19[0-9]{2})\b/);

  return `
PLACA: ${placa}
COR: ${cor}
ANO: ${ano}
`;
}

// 💾 REGISTRO
function registrar() {

  if (!textoExtraido) {
    alert("Leia a imagem primeiro.");
    return;
  }

  const agora = new Date().toLocaleString();

  const registro = `
${document.getElementById("resenha").innerText}
DATA/HORA: ${agora}
-------------------------
`;

  let historico = localStorage.getItem("registros") || "";
  historico += registro;

  localStorage.setItem("registros", historico);

  document.getElementById("saida").innerText = "✅ Registro salvo!";
}
</script>

</body>
</html>
