<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastro de Veículo</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 90%;
    max-width: 350px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    text-align: center;
}

h2 {
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin-bottom: 12px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 14px;
}

button {
    width: 100%;
    padding: 12px;
    background: #2e7d32;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
}

button:hover {
    background: #1b5e20;
}
</style>
</head>

<body>

<div class="container">

<h2>CADASTRO DE VEÍCULO</h2>

<input type="text" id="modelo" placeholder="Modelo">
<input type="text" id="placa" placeholder="Placa (ABC1D23 ou ABC1234)">
<input type="number" id="ano" placeholder="Ano">
<input type="text" id="cidade" placeholder="Cidade">

<button onclick="registrar()">Registrar</button>

</div>

<script>
function registrar() {

    const modelo = document.getElementById('modelo').value.toUpperCase();
    const placa = document.getElementById('placa').value.toUpperCase();
    const ano = document.getElementById('ano').value;
    const cidade = document.getElementById('cidade').value.toUpperCase();

    if (!modelo || !placa || !ano || !cidade) {
        alert("Preencha todos os campos");
        return;
    }

    // Data e hora automática
    const dataHora = new Date().toLocaleString('pt-BR');

    const registro = {
        modelo,
        placa,
        ano,
        cidade,
        dataHora
    };

    console.log(registro);

    alert("Registro salvo com sucesso!");

    // limpar campos
    document.getElementById('modelo').value = "";
    document.getElementById('placa').value = "";
    document.getElementById('ano').value = "";
    document.getElementById('cidade').value = "";
}
</script>

</body>
</html>
