<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Registro via Sinesp</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      padding: 20px;
      text-align: center;
    }
    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    button {
      margin-top: 10px;
      padding: 10px;
      width: 100%;
      border: none;
      background: #007bff;
      color: white;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
    #resenha {
      margin-top: 15px;
      text-align: left;
      background: #eee;
      padding: 10px;
      border-radius: 5px;
      white-space: pre-line;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Registro via Print Sinesp</h2>

  <input type="file" id="imagem" accept="image/*">

  <button onclick="lerImagem()">📸 Ler imagem</button>

  <div id="resenha"></div>

  <button onclick="registrar()">✅ Registrar</button>

  <div id="saida"></div>
</div>

<script>
let textoExtraido = "";

function lerImagem() {
  const file = document.getElementById('imagem').files[0];
  if (!file) {
    alert("Selecione uma imagem primeiro.");
    return;
  }

  document.getElementById("resenha").innerText = "Lendo imagem...";

  Tesseract.recognize(
    file,
    'por',
    { logger: m => console.log(m) }
  ).then(({ data: { text } }) => {

    textoExtraido = text;

    const dados = extrairDados(text);

    document.getElementById("resenha").innerText = dados;

  });
}

function extrairDados(texto) {
  function pegar(campo) {
    const regex = new RegExp(campo + "[:\\s]+(.+)", "i");
    const match = texto.match(regex);
    return match ? match[1].split("\n")[0] : "Não encontrado";
  }

  const placa = texto.match(/[A-Z]{3}[0-9][A-Z0-9][0-9]{2}/i);

  return `
PLACA: ${placa ? placa[0] : "Não encontrada"}
MARCA/MODELO: ${pegar("marca|modelo")}
ANO MODELO: ${pegar("ano modelo")}
ANO FABRICAÇÃO: ${pegar("ano fabricação")}
COR: ${pegar("cor")}
CIDADE/UF: ${pegar("cidade|estado")}
`;
}

function registrar() {
  if (!textoExtraido) {
    alert("Leia a imagem primeiro.");
    return;
  }

  const agora = new Date().toLocaleString();

  const registro = `
${document.getElementById("resenha").innerText}
DATA/HORA: ${agora}
-------------------------
`;

  let historico = localStorage.getItem("registros") || "";
  historico += registro;

  localStorage.setItem("registros", historico);

  document.getElementById("saida").innerText = "Registro salvo com sucesso!";
}
</script>

</body>
</html>
