<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Registro Sinesp</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f5f5f5;
  padding: 20px;
}

.container {
  background: white;
  padding: 20px;
  border-radius: 10px;
  max-width: 500px;
  margin: auto;
}

button {
  padding: 10px;
  margin: 10px;
  cursor: pointer;
}

#resenha {
  margin-top: 20px;
  white-space: pre-line;
  text-align: left;
}

table {
  width: 100%;
  margin-top: 20px;
  border-collapse: collapse;
}

th, td {
  border: 1px solid #ccc;
  padding: 8px;
  font-size: 12px;
}
</style>
</head>

<body>

<div class="container">
  <h2>REGISTRO POR IMAGEM</h2>

  <input type="file" id="imagem" accept="image/*"><br>

  <button onclick="lerImagem()">Ler imagem</button>
  <button onclick="registrar()">Registrar</button>

  <div id="status"></div>
  <div id="resenha"></div>

  <table id="tabela">
    <thead>
      <tr>
        <th>PLACA</th>
        <th>MARCA/MODELO</th>
        <th>ANO</th>
        <th>COR</th>
        <th>CIDADE/UF</th>
        <th>DATA/HORA</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>

let dadosExtraidos = null;

// 🔥 LER IMAGEM (OCR MELHORADO)
function lerImagem() {
  const file = document.getElementById('imagem').files[0];

  if (!file) {
    alert("Selecione uma imagem");
    return;
  }

  document.getElementById("status").innerText = "⏳ LENDO IMAGEM...";

  Tesseract.recognize(file, 'eng', {
    tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789 /-',
  })
  .then(({ data: { text } }) => {

    console.log("OCR:", text);

    dadosExtraidos = extrairDados(text);

    document.getElementById("status").innerText = "✅ IMAGEM PROCESSADA";

  })
  .catch(() => {
    document.getElementById("status").innerText = "❌ ERRO AO LER IMAGEM";
  });
}


// 🔥 EXTRAÇÃO INTELIGENTE
function extrairDados(texto) {

  texto = texto.toUpperCase();

  function buscar(regex) {
    const m = texto.match(regex);
    return m ? m[0].trim() : "-";
  }

  // PLACA (foco principal)
  let placa = "-";
  let match = texto.match(/\b[A-Z]{3}[0-9][A-Z0-9][0-9]{2}\b/);

  if (match) {
    placa = match[0];
  } else {
    let t = texto.replace(/\s/g, "");
    let match2 = t.match(/[A-Z]{3}[0-9][A-Z0-9][0-9]{2}/);
    if (match2) placa = match2[0];
  }

  // ANO
  let ano = buscar(/\b(20\d{2}|19\d{2})\b/);

  // COR
  let cor = buscar(/PRETO|BRANCO|PRATA|VERMELHO|AZUL|CINZA|VERDE/);

  // MARCA
  let marca = "-";
  const marcas = ["TOYOTA","HONDA","FORD","FIAT","VW","VOLKSWAGEN","CHEVROLET","HYUNDAI"];

  for (let m of marcas) {
    let r = new RegExp(m + "[A-Z0-9\\s/-]*");
    let res = texto.match(r);
    if (res) {
      marca = res[0];
      break;
    }
  }

  // CIDADE
  let cidade = "-";
  let c = texto.match(/[A-Z\s]{3,}\/[A-Z]{2}/);
  if (c) cidade = c[0];

  return { placa, marca, ano, cor, cidade };
}


// 🔥 REGISTRAR
function registrar() {

  if (!dadosExtraidos) {
    alert("Leia a imagem primeiro");
    return;
  }

  const dataHora = new Date().toLocaleString("pt-BR");

  const resenha =
`PLACA: ${dadosExtraidos.placa}
MARCA/MODELO: ${dadosExtraidos.marca}
ANO: ${dadosExtraidos.ano}
COR: ${dadosExtraidos.cor}
CIDADE/UF: ${dadosExtraidos.cidade}
DATA/HORA: ${dataHora}`;

  // 🔥 MOSTRA RESENHA APENAS AGORA
  document.getElementById("resenha").innerText = resenha;

  // 🔥 INSERE NA TABELA
  const tabela = document.querySelector("#tabela tbody");

  const linha = `
<tr>
<td>${dadosExtraidos.placa}</td>
<td>${dadosExtraidos.marca}</td>
<td>${dadosExtraidos.ano}</td>
<td>${dadosExtraidos.cor}</td>
<td>${dadosExtraidos.cidade}</td>
<td>${dataHora}</td>
</tr>
`;

  tabela.innerHTML += linha;

  // limpa estado
  dadosExtraidos = null;
  document.getElementById("status").innerText = "✅ REGISTRADO COM SUCESSO";
}

</script>

</body>
</html>
