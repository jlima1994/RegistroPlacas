<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leitor de Documento Veicular</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body {
    font-family: Arial;
    padding: 15px;
    background: #f4f4f4;
}

h2 {
    text-align: center;
}

input, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    font-size: 16px;
}

button {
    background: #28a745;
    color: white;
    border: none;
    border-radius: 5px;
}

table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
    background: white;
}

th, td {
    padding: 8px;
    border: 1px solid #ccc;
    font-size: 13px;
    text-align: center;
}

th {
    background: #333;
    color: white;
}

#log {
    margin-top: 15px;
    background: black;
    color: lime;
    padding: 10px;
    font-size: 11px;
    height: 150px;
    overflow: auto;
}
</style>
</head>

<body>

<h2>Leitura de Documento</h2>

<input type="file" id="imagem" accept="image/*">
<button onclick="processarImagem()">Processar</button>

<table id="tabela">
<thead>
<tr>
<th>Placa</th>
<th>Fabricante/Modelo</th>
<th>Cor</th>
<th>Cidade/Estado</th>
<th>Data Hora</th>
</tr>
</thead>
<tbody></tbody>
</table>

<pre id="log"></pre>

<script>
function logTela(msg) {
    const log = document.getElementById("log");
    log.innerText += "\n\n" + msg;
}

// 🔥 Função principal OCR
async function processarImagem() {

    const input = document.getElementById('imagem');
    const file = input.files[0];

    if (!file) {
        alert("Selecione uma imagem");
        return;
    }

    logTela("Processando imagem...");

    const imgURL = URL.createObjectURL(file);

    const { data: { text } } = await Tesseract.recognize(
        imgURL,
        'por',
        { logger: m => console.log(m) }
    );

    logTela("TEXTO OCR:");
    logTela(text);

    // 🔥 EXTRAÇÃO
    const placa = extrairPlaca(text);
    const modelo = extrairModelo(text);
    const cor = extrairCor(text);
    const cidade = extrairCidade(text);
    const dataHora = new Date().toLocaleString('pt-BR');

    logTela("PLACA: " + placa);
    logTela("MODELO: " + modelo);
    logTela("COR: " + cor);
    logTela("CIDADE: " + cidade);

    adicionarTabela(placa, modelo, cor, cidade, dataHora);
}

// 🔎 EXTRAIR PLACA
function extrairPlaca(texto) {
    const match = texto.match(/[A-Z]{3}[- ]?[0-9][A-Z0-9][0-9]{2}/);
    return match ? match[0] : "NÃO IDENTIFICADO";
}

// 🔎 EXTRAIR MODELO
function extrairModelo(texto) {
    const linhas = texto.split("\n");

    for (let l of linhas) {
        if (l.length > 5 && l.match(/[A-Z]/)) {
            return l;
        }
    }

    return "NÃO IDENTIFICADO";
}

// 🔎 EXTRAIR COR
function extrairCor(texto) {
    const cores = ["BRANCA","PRETA","PRATA","VERMELHA","AZUL","CINZA"];

    for (let cor of cores) {
        if (texto.toUpperCase().includes(cor)) {
            return cor;
        }
    }

    return "NÃO IDENTIFICADO";
}

// 🔎 EXTRAIR CIDADE/UF
function extrairCidade(texto) {
    const match = texto.match(/[A-Z\s]+\/[A-Z]{2}/);
    return match ? match[0] : "NÃO IDENTIFICADO";
}

// ➕ ADICIONAR NA TABELA
function adicionarTabela(placa, modelo, cor, cidade, dataHora) {

    const tabela = document.querySelector("#tabela tbody");
    const linha = tabela.insertRow();

    linha.innerHTML = `
        <td>${placa}</td>
        <td>${modelo}</td>
        <td>${cor}</td>
        <td>${cidade}</td>
        <td>${dataHora}</td>
    `;
}
</script>

</body>
</html>
