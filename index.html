<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastro de Veículo</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    padding: 20px;
}

.container {
    background: white;
    padding: 20px;
    border-radius: 10px;
    max-width: 400px;
    margin: auto;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    text-align: center;
}

input {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    background: #2e7d32;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
}

table {
    margin-top: 30px;
    width: 100%;
    border-collapse: collapse;
    background: white;
}

th, td {
    padding: 10px;
    border: 1px solid #ddd;
    font-size: 14px;
}

th {
    background: #333;
    color: white;
}
</style>
</head>

<body>

<div class="container">

<h2>CADASTRO DE VEÍCULO</h2>

<input type="text" id="modelo" placeholder="Modelo">
<input type="text" id="placa" placeholder="Placa (ABC1D23 ou ABC1234)">
<input type="number" id="ano" placeholder="Ano">
<input type="text" id="cidade" placeholder="Cidade">

<button onclick="registrar()">Registrar</button>

</div>

<table id="tabela">
<thead>
<tr>
<th>Modelo</th>
<th>Placa</th>
<th>Ano</th>
<th>Cidade</th>
<th>Data e Hora</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
function registrar() {

    const modelo = document.getElementById('modelo').value.toUpperCase();
    const placa = document.getElementById('placa').value.toUpperCase();
    const ano = document.getElementById('ano').value;
    const cidade = document.getElementById('cidade').value.toUpperCase();

    if (!modelo || !placa || !ano || !cidade) {
        alert("Preencha todos os campos");
        return;
    }

    const dataHora = new Date().toLocaleString('pt-BR');

    const tabela = document.querySelector("#tabela tbody");

    const linha = document.createElement("tr");

    linha.innerHTML = `
        <td>${modelo}</td>
        <td>${placa}</td>
        <td>${ano}</td>
        <td>${cidade}</td>
        <td>${dataHora}</td>
    `;

    tabela.appendChild(linha);

    // limpar campos
    document.getElementById('modelo').value = "";
    document.getElementById('placa').value = "";
    document.getElementById('ano').value = "";
    document.getElementById('cidade').value = "";
}
</script>

</body>
</html>
