<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leitor de Veículo</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:#fff;
    text-align:center;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
}

button{
    width:100%;
    padding:15px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#22c55e;
    color:#000;
    font-weight:bold;
    font-size:16px;
}

input{
    width:100%;
    margin-top:10px;
}

table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
    background:#1e293b;
}

th, td{
    padding:10px;
    border:1px solid #334155;
    font-size:12px;
}

th{
    background:#334155;
}

.erro{
    color:#ef4444;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>LEITOR DE VEÍCULO</h2>

<input type="file" id="imageInput" accept="image/*">

<button onclick="processar()">PROCESSAR IMAGEM</button>

<div id="status"></div>

<table id="tabela" style="display:none;">
<thead>
<tr>
<th>PLACA</th>
<th>MODELO</th>
<th>ANO</th>
<th>COR</th>
<th>CIDADE/UF</th>
<th>DATA</th>
</tr>
</thead>
<tbody id="corpoTabela"></tbody>
</table>

</div>

<script>

async function processar(){

    const file = document.getElementById('imageInput').files[0];
    if(!file){
        alert("Selecione uma imagem");
        return;
    }

    document.getElementById("status").innerText = "LENDO IMAGEM...";

    const { data: { text } } = await Tesseract.recognize(file, 'por');

    console.log(text);

    let resultado = extrairDados(text);

    if(!resultado){
        document.getElementById("status").innerHTML = "<div class='erro'>ERRO AO IDENTIFICAR DADOS</div>";
        return;
    }

    adicionarTabela(resultado);

    document.getElementById("status").innerText = "SUCESSO";
}

function extrairDados(texto){

    texto = texto.toUpperCase();

    console.log("OCR BRUTO:\n", texto);

    // NORMALIZAÇÃO PESADA
    texto = texto
        .replace(/0/g, "O")
        .replace(/\|/g, "I")
        .replace(/,/g, "")
        .replace(/\s+/g, " ");

    let linhas = texto.split("\n")
        .map(l => l.trim())
        .filter(l => l.length > 2);

    console.log("LINHAS:", linhas);

    let placa = null;
    let modelo = null;
    let anoFab = null;
    let anoModelo = null;
    let cor = null;
    let cidade = null;

    // 🔎 PLACA (mais confiável)
    for(let l of linhas){
        let match = l.match(/[A-Z]{3}\s?[0-9][A-Z0-9][0-9]{2}/);
        if(match){
            placa = match[0].replace(" ", "");
            break;
        }
    }

    // 🔎 EXTRAÇÃO POR POSIÇÃO RELATIVA
    for(let i = 0; i < linhas.length; i++){

        let l = linhas[i];

        // MODELO
        if(l.includes("MARCA") || l.includes("MODELO")){
            modelo = linhas[i+1] || modelo;
        }

        // ANO MODELO
        if(l.includes("MODELO") && l.includes("ANO")){
            let val = (linhas[i+1] || "").match(/\d{4}/);
            if(val) anoModelo = val[0];
        }

        // ANO FABRICAÇÃO
        if(l.includes("FABR")){
            let val = (linhas[i+1] || "").match(/\d{4}/);
            if(val) anoFab = val[0];
        }

        // COR
        if(l.includes("COR")){
            cor = linhas[i+1] || cor;
        }

        // CIDADE
        if(l.includes("CIDADE")){
            cidade = linhas[i+1] || cidade;
        }
    }

    // 🔥 FALLBACK INTELIGENTE PARA ANOS
    if(!anoFab || !anoModelo){
        let anos = texto.match(/\d{4}/g);
        if(anos && anos.length >= 2){
            anoFab = anos[0];
            anoModelo = anos[1];
        }
    }

    // 🔥 LIMPEZA FINAL
    if(modelo) modelo = modelo.replace(/[^A-Z0-9\/\.\- ]/g, "").trim();
    if(cor) cor = cor.replace(/[^A-Z ]/g, "").trim();
    if(cidade) cidade = cidade.replace(/[^A-Z \-]/g, "").trim();

    console.log({placa, modelo, anoFab, anoModelo, cor, cidade});

    // VALIDAÇÃO FINAL FLEXÍVEL
    if(!placa || !modelo){
        return null;
    }

    return {
        placa,
        modelo,
        ano: (anoFab && anoModelo) ? `${anoFab}/${anoModelo}` : "N/I",
        cor: cor || "N/I",
        cidade: cidade || "N/I"
    };
}
function adicionarTabela(dados){

    const tabela = document.getElementById("tabela");
    const corpo = document.getElementById("corpoTabela");

    tabela.style.display = "table";

    let dataHora = new Date().toLocaleString("pt-BR");

    let linha = `
    <tr>
        <td>${dados.placa}</td>
        <td>${dados.modelo}</td>
        <td>${dados.ano}</td>
        <td>${dados.cor}</td>
        <td>${dados.cidade}</td>
        <td>${dataHora}</td>
    </tr>
    `;

    corpo.innerHTML += linha;
}

</script>

</body>
</html>
