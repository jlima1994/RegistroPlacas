<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastro de Veículos</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    padding: 20px;
}

.container {
    background: white;
    padding: 20px;
    border-radius: 10px;
    max-width: 400px;
    margin: auto;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    text-align: center;
}

input, select {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    background: #2e7d32;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    margin-bottom: 5px;
}

table {
    margin-top: 30px;
    width: 100%;
    border-collapse: collapse;
    background: white;
}

th, td {
    padding: 10px;
    border: 1px solid #ddd;
    font-size: 14px;
}

th {
    background: #333;
    color: white;
}
</style>
</head>

<body>

<div class="container">

<h2>CADASTRO DE VEÍCULOS</h2>

<input type="text" id="modelo" placeholder="Modelo">
<input type="text" id="placa" placeholder="Placa">

<select id="ano">
    <option value="">Ano Modelo</option>
</select>

<input type="text" id="cidade" placeholder="Cidade">

<button onclick="registrar()">Registrar</button>

</div>

<table>
<thead>
<tr>
<th>Modelo</th>
<th>Placa</th>
<th>Ano Modelo</th>
<th>Cidade</th>
<th>Data e Hora</th>
</tr>
</thead>
<tbody id="corpoTabela"></tbody>
</table>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

// 🔴 COLE SEU CONFIG AQUI
const firebaseConfig = {
    apiKey: "AIzaSyB-IpEzDag4tFUv3ijwVwyeqiPhtgOlL0Q",
    authDomain: "sistema-veicu.firebaseapp.com",
    projectId: "sistema-veicu",
    storageBucket: "sistema-veicu.firebasestorage.app",
    messagingSenderId: "984955826872",
    appId: "1:984955826872:web:bc04704905ac8503c9ba4d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();


// 🔢 GERAR ANOS AUTOMÁTICO
function gerarAnos() {

    const select = document.getElementById("ano");

    const anoAtual = new Date().getFullYear();
    const anoFinal = anoAtual + 1;

    for (let ano = anoFinal; ano >= 1940; ano--) {
        const option = document.createElement("option");
        option.value = ano;
        option.textContent = ano;
        select.appendChild(option);
    }
}


// 🚀 REGISTRAR
function registrar() {

    const modelo = document.getElementById('modelo').value.toUpperCase();
    const placa = document.getElementById('placa').value.toUpperCase();
    const ano = document.getElementById('ano').value;
    const cidade = document.getElementById('cidade').value.toUpperCase();

    if (!modelo || !placa || !ano || !cidade) {
        alert("Preencha todos os campos");
        return;
    }

    const data = new Date();

    db.collection("registros").add({
        modelo,
        placa,
        ano,
        cidade,
        data: data
    })
    .then(() => {
        alert("Salvo com sucesso!");
        limparCampos();
        carregarDados();
    })
    .catch((error) => {
        console.error("Erro:", error);
    });
}


// 🔄 CARREGAR DADOS
function carregarDados() {

    const tabela = document.getElementById("corpoTabela");
    tabela.innerHTML = "";

    db.collection("registros")
      .orderBy("data", "desc")
      .get()
      .then(snapshot => {

        snapshot.forEach(doc => {

            const reg = doc.data();

            const dataFormatada = new Date(reg.data.seconds * 1000)
                .toLocaleString('pt-BR');

            const linha = document.createElement("tr");

            linha.innerHTML = `
                <td>${reg.modelo}</td>
                <td>${reg.placa}</td>
                <td>${reg.ano}</td>
                <td>${reg.cidade}</td>
                <td>${dataFormatada}</td>
            `;

            tabela.appendChild(linha);
        });
    });
}


// 🧹 LIMPAR CAMPOS
function limparCampos() {
    document.getElementById('modelo').value = "";
    document.getElementById('placa').value = "";
    document.getElementById('ano').value = "";
    document.getElementById('cidade').value = "";
}


// 🔄 INICIALIZAÇÃO
window.onload = () => {
    gerarAnos();
    carregarDados();
};

</script>

</body>
</html>
